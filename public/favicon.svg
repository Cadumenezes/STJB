<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <defs>
    <!-- Gradiente 1: Roxo para Rosa (Movimento e Energia) -->
    <linearGradient id="grad-primary" x1="10%" y1="90%" x2="90%" y2="10%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="50%" stop-color="#d946ef" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    
    <!-- Gradiente 2: Azul/Ciano para Roxo (Profundidade e Fluidez) -->
    <linearGradient id="grad-secondary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="60%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <!-- Filtro de Sombra/Brilho para destacar nas abas escuras e claras -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Letra 'D' em estilo de Fita Fluida / Onda de Dança -->
  <g filter="url(#glow)">
    <!-- Onda secundária (Fundo - Azul/Ciano para dar profundidade e efeito neon) -->
    <path 
      d="M25 14 C22 26 22 38 25 48 C30 50 49 44 49 31 C49 18 39 14 29 16 C23 18 21 26 27 28" 
      stroke="url(#grad-secondary)" 
      stroke-width="11" 
      stroke-linecap="round" 
      stroke-linejoin="round"
      opacity="0.75"
    />
    
    <!-- Onda primária (Frente - Roxo para Rosa) -->
    <path 
      d="M24 14 C22 26 22 38 24 48 C28 50 48 44 48 31 C48 18 38 14 28 16 C22 18 20 26 26 28" 
      stroke="url(#grad-primary)" 
      stroke-width="7" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
    
    <!-- Núcleo de brilho dinâmico para dar aspecto 3D premium -->
    <path 
      d="M24 16 C22.5 26 22.5 38 24 46 C27.5 48 46 42.5 46 31 C46 19.5 37 15.5 28 17.5 C23.5 19 21.5 25 25.5 27" 
      stroke="#ffffff" 
      stroke-width="1.8" 
      stroke-linecap="round" 
      stroke-linejoin="round"
      opacity="0.3"
    />
  </g>
</svg>