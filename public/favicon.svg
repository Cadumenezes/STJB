<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <defs>
    <!-- Gradiente 1: Roxo para Rosa (Movimento e Energia) -->
    <linearGradient id="grad-primary" x1="10%" y1="90%" x2="90%" y2="10%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="50%" stop-color="#d946ef" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    
    <!-- Gradiente 2: Azul/Ciano para Roxo (Profundidade e Fluidez) -->
    <linearGradient id="grad-secondary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="60%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <!-- Filtro de Sombra/Brilho para destacar nas abas escuras e claras -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Corpo do Fluxo / Onda de Dança -->
  <!-- Um traço suave em 'S' ou fita contínua que representa dinâmica de movimento -->
  <g filter="url(#glow)">
    <!-- Onda secundária (fundo) -->
    <path d="M14 44C10 38 12 28 20 20C28 12 38 8 46 14C54 20 52 30 44 38C36 46 26 50 18 50C13 50 16 46 16 44Z" fill="url(#grad-secondary)" opacity="0.85" />
    
    <!-- Onda primária (frente) - Formato de infinito/fluxo elegante -->
    <path d="M16 48C10 42 8 32 16 22C24 12 36 10 44 16C52 22 50 34 42 42C34 50 22 54 16 48Z" fill="url(#grad-primary)" />
    
    <!-- Núcleo de brilho dinâmico para dar aspecto 3D premium -->
    <path d="M22 26C28 18 36 16 42 22C46 26 44 32 38 36C32 40 24 34 22 26Z" fill="#ffffff" opacity="0.2" />
  </g>
</svg>